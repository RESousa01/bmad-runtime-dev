name: Security nightly

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Runs nightly on the hosted lane with no organization-runner dependency.
  advisories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # reviewed master 2026-07-16
        with:
          toolchain: 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:boundaries
      - run: pnpm secrets:check
      - run: cargo install cargo-deny --version 0.19.4 --locked
      - run: cargo deny check advisories bans licenses sources

  # The Windows-native replica stays gated on the organization runner lane.
  boundaries-and-advisories:
    if: ${{ vars.SAPPHIRUS_NATIVE_LANE_ENABLED == 'true' }}
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # reviewed master 2026-07-16
        with:
          toolchain: 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:boundaries
      - run: pnpm secrets:check
      - run: cargo install cargo-deny --version 0.19.4 --locked
      - run: cargo deny check advisories bans licenses sources
      - run: cargo test --workspace --locked
