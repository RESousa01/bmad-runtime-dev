name: Security nightly

on:
  # Native security automation remains intentionally dormant until the
  # organization re-enables the Windows toolchain lane.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boundaries-and-advisories:
    if: ${{ vars.SAPPHIRUS_NATIVE_LANE_ENABLED == 'true' }}
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:boundaries
      - run: pnpm secrets:check
      - run: cargo install cargo-deny --version 0.19.4 --locked
      - run: cargo deny check advisories bans licenses sources
      - run: cargo test --workspace --locked
