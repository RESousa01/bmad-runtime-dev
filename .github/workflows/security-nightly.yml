name: Security nightly

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs nightly on the hosted lane with no organization-runner dependency.
  advisories:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.15.1
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # reviewed master 2026-07-16
        with:
          toolchain: 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:boundaries
      - run: pnpm secrets:check
      - run: pnpm audit --audit-level high
      - run: dotnet package list --project services/desktop-support-api.Tests/Sapphirus.DesktopSupportApi.Tests.csproj --vulnerable --include-transitive
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          command-arguments: advisories bans licenses sources

  # The Windows-native replica stays gated on the organization runner lane.
  boundaries-and-advisories:
    if: ${{ vars.SAPPHIRUS_NATIVE_LANE_FROZEN != 'true' }}
    runs-on: windows-2025-vs2026
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.15.1
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # reviewed master 2026-07-16
        with:
          toolchain: 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:boundaries
      - run: pnpm secrets:check
      - run: cargo test --workspace --all-features --locked
