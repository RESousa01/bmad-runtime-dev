name: Desktop

on:
  # Native automation remains intentionally dormant until the organization
  # re-enables the Windows toolchain lane.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: ${{ vars.SAPPHIRUS_NATIVE_LANE_ENABLED == 'true' }}
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # reviewed master 2026-07-16
        with:
          toolchain: 1.97.0
          components: clippy,rustfmt
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:boundaries
      - run: pnpm secrets:check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: pnpm build
