name: Contracts

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript-conformance:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm contracts:verify:typescript
      - run: git diff --exit-code

  generator-qualification:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          lfs: true
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install exact Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy --component rustfmt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rustup default 1.97.0
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ((rustc --version) -ne 'rustc 1.97.0 (2d8144b78 2026-07-07)') {
            throw 'Rust compiler version mismatch'
          }
          if ((cargo --version) -ne 'cargo 1.97.0 (c980f4866 2026-06-30)') {
            throw 'Cargo version mismatch'
          }
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json
      - run: pnpm install --frozen-lockfile
      - name: Restore reviewed cargo-typify generator
        shell: pwsh
        env:
          CARGO_HOME: ${{ runner.temp }}\sapphirus-contract-cargo-home
        run: |
          # cargo install is not byte-reproducible across hosts (Rust embeds absolute
          # build paths), so restore the reviewed prebuilt generator whose identity is
          # pinned in tool-lock.json instead of recompiling it. See
          # tools/contract-codegen/vendor/README.md.
          node tools/contract-codegen/native-generator.mjs restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Verify pinned native generator identities
        shell: pwsh
        run: |
          $cargoTypify = Join-Path $PWD 'target\contract-tools\bin\cargo-typify.exe'
          if ((& $cargoTypify typify --version) -ne 'cargo-typify 0.6.1') {
            throw 'cargo-typify version mismatch'
          }

          $dotnet = Join-Path $env:ProgramFiles 'dotnet\dotnet.exe'
          if ((& $dotnet --version) -ne '10.0.302') {
            throw '.NET SDK version mismatch'
          }
          & $dotnet tool restore --tool-manifest .config/dotnet-tools.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Restore locked C# conformance dependencies
        shell: pwsh
        run: |
          $dotnet = Join-Path $env:ProgramFiles 'dotnet\dotnet.exe'
          & $dotnet restore tests/generator-qualification/dotnet/Sapphirus.GeneratorQualification.Tests.csproj --locked-mode
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $dotnet restore tests/conformance/dotnet/Sapphirus.Contracts.Conformance.Tests.csproj --locked-mode
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Verify cross-language generators
        shell: pwsh
        env:
          CARGO_HOME: ${{ runner.temp }}\sapphirus-contract-cargo-home
        run: |
          # setup-dotnet injects DOTNET_MULTILEVEL_LOOKUP into the job env, which the
          # native codegen injection gate rejects. Scrub it in-process so the spawned
          # node generators inherit the reviewed environment. Run twice for determinism.
          Remove-Item Env:\DOTNET_MULTILEVEL_LOOKUP -ErrorAction SilentlyContinue
          pnpm contracts:verify:cross-language
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pnpm contracts:verify:cross-language
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - name: Run C# generator qualification
        shell: pwsh
        run: |
          $dotnet = Join-Path $env:ProgramFiles 'dotnet\dotnet.exe'
          & $dotnet test --project tests/generator-qualification/dotnet/Sapphirus.GeneratorQualification.Tests.csproj --configuration Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Run C# BMAD conformance
        shell: pwsh
        run: |
          $dotnet = Join-Path $env:ProgramFiles 'dotnet\dotnet.exe'
          & $dotnet test --project tests/conformance/dotnet/Sapphirus.Contracts.Conformance.Tests.csproj --configuration Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - run: pnpm verify:boundaries
      - run: pnpm secrets:check
      - run: git diff --check
      - run: git diff --exit-code
