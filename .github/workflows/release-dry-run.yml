name: Internal installer dry run

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-installer:
    if: ${{ vars.SAPPHIRUS_NATIVE_LANE_FROZEN != 'true' }}
    runs-on: windows-2025-vs2026
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.15.1
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Resolve release metadata
        id: release-metadata
        shell: pwsh
        run: node tools/resolve-release-metadata.mjs --github-output "$env:GITHUB_OUTPUT"
      - run: pnpm desktop:build
      - name: Qualify installer lifecycle
        shell: pwsh
        run: >-
          ./tools/qualify-windows-installer.ps1
          -InstallerPath "target/release/bundle/nsis/${{ steps.release-metadata.outputs.installer_name }}"
          -ExpectedVersion "${{ steps.release-metadata.outputs.product_version }}"
          -InstallRoot "${{ runner.temp }}\\sapphirus-installer-qualification"
          -EvidencePath "${{ runner.temp }}\\sapphirus-installer-qualification.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: internal-test-installer
          path: |
            target/release/bundle/nsis/*
            ${{ runner.temp }}/sapphirus-installer-qualification.json
          if-no-files-found: error
