name: Internal installer dry run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-installer:
    if: ${{ vars.SAPPHIRUS_NATIVE_LANE_ENABLED == 'true' }}
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.12.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Resolve release metadata
        id: release-metadata
        shell: pwsh
        run: node tools/resolve-release-metadata.mjs --github-output "$env:GITHUB_OUTPUT"
      - run: pnpm desktop:build
      - name: Qualify installer lifecycle
        shell: pwsh
        run: >-
          ./tools/qualify-windows-installer.ps1
          -InstallerPath "target/release/bundle/nsis/${{ steps.release-metadata.outputs.installer_name }}"
          -ExpectedVersion "${{ steps.release-metadata.outputs.product_version }}"
          -InstallRoot "${{ runner.temp }}\\sapphirus-installer-qualification"
          -EvidencePath "${{ runner.temp }}\\sapphirus-installer-qualification.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: internal-test-installer
          path: |
            target/release/bundle/nsis/*
            ${{ runner.temp }}/sapphirus-installer-qualification.json
          if-no-files-found: error
